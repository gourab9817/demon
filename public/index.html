<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synccode - Execution Logs</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Monaco", "Courier New", monospace;
        background: #0d0d0d;
        color: #00ff00;
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
      }

      .header {
        background: linear-gradient(90deg, #16213e 0%, #0f3460 100%);
        padding: 20px;
        border-bottom: 2px solid #00ff00;
        box-shadow: 0 4px 6px rgba(0, 255, 0, 0.1);
      }

      .header h1 {
        font-size: 28px;
        color: #00ff00;
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        margin-bottom: 5px;
      }

      .header p {
        color: #00cc00;
        font-size: 12px;
        opacity: 0.8;
      }

      .stats {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        font-size: 12px;
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .stat-value {
        color: #00ff00;
        font-weight: bold;
      }

      .logs-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #0d0d0d;
      }

      .log-entry {
        display: flex;
        gap: 15px;
        padding: 8px 12px;
        margin-bottom: 5px;
        border-left: 3px solid #00ff00;
        background: rgba(0, 255, 0, 0.05);
        border-radius: 2px;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .log-entry.error {
        border-left-color: #ff0000;
        background: rgba(255, 0, 0, 0.05);
      }

      .log-entry.success {
        border-left-color: #00ff00;
        background: rgba(0, 255, 0, 0.05);
      }

      .log-entry.warning {
        border-left-color: #ffff00;
        background: rgba(255, 255, 0, 0.05);
      }

      .log-timestamp {
        color: #00cc00;
        font-size: 11px;
        flex-shrink: 0;
        opacity: 0.7;
        min-width: 150px;
      }

      .log-message {
        color: #00ff00;
        font-size: 12px;
        flex: 1;
        word-break: break-word;
      }

      .log-entry.error .log-message {
        color: #ff6666;
      }

      .log-entry.success .log-message {
        color: #66ff66;
      }

      .log-entry.warning .log-message {
        color: #ffff99;
      }

      .footer {
        background: #16213e;
        padding: 15px 20px;
        border-top: 1px solid #00ff00;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: #00cc00;
      }

      .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00ff00;
        animation: pulse 2s infinite;
        margin-right: 5px;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .controls {
        display: flex;
        gap: 10px;
      }

      button {
        background: #00ff00;
        color: #0d0d0d;
        border: none;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-family: "Monaco", "Courier New", monospace;
        font-weight: bold;
        font-size: 11px;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #00cc00;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      }

      button:active {
        transform: scale(0.95);
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        color: #00cc00;
        text-align: center;
      }

      .empty-state h2 {
        font-size: 24px;
        margin-bottom: 10px;
        color: #00ff00;
      }

      .empty-state p {
        opacity: 0.7;
        font-size: 12px;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #1a1a2e;
      }

      ::-webkit-scrollbar-thumb {
        background: #00ff00;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #00cc00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚀 SYNCCODE EXECUTION LOGS</h1>
        <p>Real-time monitoring dashboard</p>
        <div class="stats">
          <div class="stat">
            <span>Total Logs:</span>
            <span class="stat-value" id="total-logs">0</span>
          </div>
          <div class="stat">
            <span>Refresh Rate:</span>
            <span class="stat-value">1s</span>
          </div>
          <div class="stat">
            <span>Status:</span>
            <span class="status-indicator" id="status"></span>
            <span class="stat-value" id="status-text">Connecting...</span>
          </div>
        </div>
      </div>

      <div class="logs-container" id="logs-container">
        <div class="empty-state">
          <h2>⏳ Waiting for logs...</h2>
          <p>Logs will appear here as the orchestrator executes</p>
        </div>
      </div>

      <div class="footer">
        <div>
          Last updated: <span id="last-update">Never</span>
        </div>
        <div class="controls">
          <button onclick="clearLogs()">Clear Logs</button>
          <button onclick="autoScroll = !autoScroll">
            Auto-scroll: <span id="autoscroll-status">ON</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      let allLogs = [];
      let autoScroll = true;
      let lastLogCount = 0;

      function formatLogType(message) {
        if (message.includes("❌")) return "error";
        if (message.includes("✓")) return "success";
        if (message.includes("⚠")) return "warning";
        return "";
      }

      function displayLogs(logs) {
        const container = document.getElementById("logs-container");

        if (logs.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h2>⏳ Waiting for logs...</h2>
              <p>Logs will appear here as the orchestrator executes</p>
            </div>
          `;
          return;
        }

        container.innerHTML = logs
          .map(
            (log) => `
          <div class="log-entry ${formatLogType(log.message)}">
            <span class="log-timestamp">${new Date(log.timestamp).toLocaleTimeString()}</span>
            <span class="log-message">${escapeHtml(log.message)}</span>
          </div>
        `
          )
          .join("");

        if (autoScroll) {
          container.scrollTop = container.scrollHeight;
        }

        document.getElementById("total-logs").textContent = logs.length;
        document.getElementById("last-update").textContent = new Date().toLocaleTimeString();
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.replace(/[&<>"']/g, (m) => map[m]);
      }

      async function fetchLogs() {
        try {
          const response = await fetch("/api/logs");
          const data = await response.json();

          if (data.success) {
            allLogs = data.logs;
            displayLogs(allLogs);

            if (allLogs.length > lastLogCount) {
              document.getElementById("status-text").textContent = "Active";
              document.getElementById("status").style.background = "#00ff00";
            }

            lastLogCount = allLogs.length;
          }
        } catch (error) {
          console.error("Error fetching logs:", error);
          document.getElementById("status-text").textContent = "Connection Error";
          document.getElementById("status").style.background = "#ff0000";
        }
      }

      function clearLogs() {
        if (confirm("Clear all logs?")) {
          allLogs = [];
          displayLogs([]);
          document.getElementById("total-logs").textContent = "0";
        }
      }

      // Initial fetch
      fetchLogs();

      // Fetch logs every 1 second
      setInterval(fetchLogs, 1000);

      // Update autoscroll button text
      setInterval(() => {
        document.getElementById("autoscroll-status").textContent = autoScroll ? "ON" : "OFF";
      }, 500);
    </script>
  </body>
</html>
